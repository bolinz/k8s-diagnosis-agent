apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-diagnosis-agent
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8s-diagnosis-agent
                port:
                  name: http
