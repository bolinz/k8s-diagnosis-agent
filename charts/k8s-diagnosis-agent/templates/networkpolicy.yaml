apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8s-diagnosis-agent
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: k8s-diagnosis-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
