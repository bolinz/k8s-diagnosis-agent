apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: diagnosisreports.ops.ai.yourorg
spec:
  group: ops.ai.yourorg
  scope: Namespaced
  names:
    plural: diagnosisreports
    singular: diagnosisreport
    kind: DiagnosisReport
    shortNames:
      - drpt
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - source
                - cluster
                - namespace
                - workloadRef
                - symptom
                - observedFor
                - triggerAt
              properties:
                source:
                  type: string
                cluster:
                  type: string
                namespace:
                  type: string
                workloadRef:
                  type: object
                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                symptom:
                  type: string
                observedFor:
                  type: integer
                triggerAt:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                severity:
                  type: string
                summary:
                  type: string
                probableCauses:
                  type: array
                  items:
                    type: string
                evidence:
                  type: array
                  items:
                    type: string
                recommendations:
                  type: array
                  items:
                    type: string
                confidence:
                  type: number
                relatedObjects:
                  type: array
                  items:
                    type: object
                    properties:
                      kind:
                        type: string
                      namespace:
                        type: string
                      name:
                        type: string
                      role:
                        type: string
                rootCauseCandidates:
                  type: array
                  items:
                    type: object
                    properties:
                      objectRef:
                        type: object
                        properties:
                          kind:
                            type: string
                          namespace:
                            type: string
                          name:
                            type: string
                      reason:
                        type: string
                      confidence:
                        type: number
                evidenceTimeline:
                  type: array
                  items:
                    type: object
                    properties:
                      time:
                        type: string
                      objectRef:
                        type: object
                        properties:
                          kind:
                            type: string
                          namespace:
                            type: string
                          name:
                            type: string
                      signal:
                        type: string
                impactSummary:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                qualityScore:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                uncertainties:
                  type: array
                  items:
                    type: string
                evidenceAttribution:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                analysisVersion:
                  type: string
                modelInfo:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                diagnosisTrace:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                rawSignal:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                lastAnalyzedAt:
                  type: string
      subresources:
        status: {}
