apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8s-diagnosis-agent
  namespace: k8s-diagnosis-system
spec:
  podSelector:
    matchLabels:
      app: k8s-diagnosis-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
